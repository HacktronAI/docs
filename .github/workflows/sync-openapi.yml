name: Sync OpenAPI spec

# Keeps api-reference/openapi.json in sync with the public Hacktron OpenAPI
# spec. Fetches the spec, validates it, and — only when it changed — opens a
# PR. It never commits to the default branch directly and never publishes the
# internal/basic-auth spec.

on:
  workflow_dispatch:
  schedule:
    # Daily at 06:17 UTC (off the top of the hour to avoid scheduler congestion).
    - cron: "17 6 * * *"

# Never run two syncs at once; let an in-flight run finish.
concurrency:
  group: sync-openapi
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Fetch and validate public OpenAPI spec
        run: |
          set -euo pipefail

          # Public, unauthenticated spec endpoints, prod first. NEVER use
          # /docs, /docs-json, or /docs/openapi.json — those serve the
          # internal, basic-auth full spec and must never be published.
          urls=(
            "https://api.hacktron.ai/api-docs-json"
            "https://iva.hacktron.ai/api-docs-json"
            "https://api-staging.hacktron.ai/api-docs-json"
            "https://iva-staging.hacktron.ai/api-docs-json"
          )

          tmp="$(mktemp)"
          source_url=""
          for u in "${urls[@]}"; do
            echo "Trying $u"
            if curl -fsSL --max-time 30 -H "Accept: application/json" "$u" -o "$tmp"; then
              if jq -e '(.openapi // "" | test("^3\\.")) and (.paths | type == "object") and (.paths | length > 0)' "$tmp" >/dev/null 2>&1; then
                echo "Valid OpenAPI JSON returned by $u"
                source_url="$u"
                break
              else
                echo "Response from $u is not a valid OpenAPI document; skipping"
              fi
            else
              echo "Request to $u failed; skipping"
            fi
          done

          if [ -z "$source_url" ]; then
            echo "::error::No candidate URL returned a valid public OpenAPI spec."
            exit 1
          fi

          # Authoritative validation with the same Mintlify version the docs build uses.
          npx --yes mintlify@4.2.417 openapi-check "$tmp"

          # Pretty-print while preserving key order so diffs stay minimal and idempotent.
          mkdir -p api-reference
          jq . "$tmp" > api-reference/openapi.json
          echo "Wrote api-reference/openapi.json from $source_url"

      - name: Open PR if the spec changed
        uses: peter-evans/create-pull-request@84ae59a2cdc2258d6fa0732dd66352dddae2a412 # v7.0.9
        with:
          add-paths: api-reference/openapi.json
          branch: bot/sync-openapi
          delete-branch: true
          commit-message: "chore(api-reference): sync OpenAPI spec from production"
          title: "chore(api-reference): sync OpenAPI spec"
          labels: automated, api-reference
          body: |
            Automated sync of `api-reference/openapi.json` from the public Hacktron OpenAPI spec.

            The endpoint pages in the API Reference are generated from this file, so merging this PR refreshes the rendered reference.

            - Source: first reachable public `*/api-docs-json` endpoint (prod preferred).
            - Validated with `mintlify openapi-check`.
            - This PR is only opened when the committed spec actually changed.

            _Generated by the `sync-openapi` workflow._
