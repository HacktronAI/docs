name: Sync screenshots

# Self-healing screenshot pipeline. Signs in to the staging app (Clerk),
# bypasses Vercel deployment protection with a cookie, and captures the
# screens listed in automation/screenshots.json. Opens a PR only when an
# image actually changed; the PR body lists any entries a human still needs
# to resolve.

on:
  workflow_dispatch:
  schedule:
    # Weekly, Mondays at 07:23 UTC.
    - cron: "23 7 * * 1"

concurrency:
  group: sync-screenshots
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  capture:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: automation/screenshots
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Sign in and save storage state
        env:
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_ORG_SLUG: ${{ secrets.E2E_ORG_SLUG }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          DOCS_APP_BASE_URL: ${{ secrets.DOCS_APP_BASE_URL }}
        run: npm run setup

      - name: Capture screenshots
        env:
          E2E_ORG_SLUG: ${{ secrets.E2E_ORG_SLUG }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
          DOCS_APP_BASE_URL: ${{ secrets.DOCS_APP_BASE_URL }}
        run: npm run capture

      - name: Build PR body from capture report
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          {
            echo "PR_BODY<<__PR_BODY_EOF__"
            echo "Automated screenshot refresh captured against the staging app."
            echo ""
            echo "Only the seeded test org is driven and PII is masked at capture time."
            echo ""
            if [ -f automation/screenshots/report.md ]; then
              cat automation/screenshots/report.md
            else
              echo "_No capture report was produced (the run failed before capture)._"
            fi
            echo ""
            echo "_Generated by the \`sync-screenshots\` workflow._"
            echo "__PR_BODY_EOF__"
          } >> "$GITHUB_ENV"

      - name: Open PR if any image changed
        uses: peter-evans/create-pull-request@84ae59a2cdc2258d6fa0732dd66352dddae2a412 # v7.0.9
        with:
          path: ${{ github.workspace }}
          add-paths: |
            images/**
            automation/screenshots.json
          branch: bot/sync-screenshots
          delete-branch: true
          commit-message: "chore(images): refresh screenshots from staging"
          title: "chore(images): refresh screenshots"
          labels: automated, screenshots
          body: ${{ env.PR_BODY }}
